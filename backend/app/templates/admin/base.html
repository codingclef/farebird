<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FareBird Admin{% if title %} · {{ title }}{% endif %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #333; }
    .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh; background: #1a1a2e; color: #eee; padding: 24px 0; }
    .sidebar .logo { padding: 0 24px 24px; font-size: 18px; font-weight: 700; color: #fff; border-bottom: 1px solid #2a2a4a; }
    .sidebar .logo span { color: #1A73E8; }
    .sidebar nav a { display: block; padding: 12px 24px; color: #bbb; text-decoration: none; font-size: 14px; transition: background 0.2s; }
    .sidebar nav a:hover, .sidebar nav a.active { background: #2a2a4a; color: #fff; }
    .main { margin-left: 220px; padding: 32px; min-height: 100vh; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat { background: #fff; border-radius: 10px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat .label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .stat .value { font-size: 28px; font-weight: 700; color: #1A73E8; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 10px 12px; background: #f0f2f8; color: #555; font-weight: 600; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f2f5; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.active { background: #e6f4ea; color: #2d7a38; }
    .badge.inactive { background: #fce8e6; color: #c5221f; }
    .badge.admin { background: #e8f0fe; color: #1A73E8; }
    .logout { position: fixed; bottom: 24px; left: 0; width: 220px; padding: 0 24px; }
    .logout a { display: block; padding: 10px; text-align: center; background: #2a2a4a; color: #bbb; border-radius: 8px; text-decoration: none; font-size: 13px; }
    .logout a:hover { background: #c5221f; color: #fff; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">🐦 Fare<span>Bird</span></div>
    <nav>
      <a href="/admin" {% if active == 'dashboard' %}class="active"{% endif %}>대시보드</a>
      <a href="/admin/users" {% if active == 'users' %}class="active"{% endif %}>유저 관리</a>
      <a href="/admin/routes" {% if active == 'routes' %}class="active"{% endif %}>모니터링 노선</a>
    </nav>
    <div class="logout"><a href="/admin/logout">로그아웃</a></div>
  </div>
  <div class="main">
    {% if title %}<div class="page-title">{{ title }}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
