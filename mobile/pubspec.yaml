name: farebird
description: "항공권 가격 추적 및 알림 서비스"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 네트워크
  dio: ^5.8.0+1

  # 라우팅
  go_router: ^15.1.2

  # 날짜 선택
  table_calendar: ^3.2.0

  # 날짜 포맷
  intl: ^0.20.2

  # 로컬 저장소
  shared_preferences: ^2.5.3

  # 푸시 알림
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
